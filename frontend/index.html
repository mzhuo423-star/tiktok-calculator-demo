<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>TikTok 收益测算器 - 跨境电商/工厂项目方</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <section id="modeSelector" class="mode-selector active">
            <div class="container home-container">
                <div class="header">
                    <div class="eyebrow">TikTok Growth Calculator</div>
                    <h1>TikTok 收益测算器</h1>
                    <p>用 30 秒快速估算跨境生意的内容获客、销售利润和项目转化空间。</p>
                </div>

                <div class="home-metrics" aria-label="测算覆盖指标">
                    <div>
                        <strong>2</strong>
                        <span>业务模型</span>
                    </div>
                    <div>
                        <strong>30s</strong>
                        <span>完成测算</span>
                    </div>
                    <div>
                        <strong>0</strong>
                        <span>后端成本</span>
                    </div>
                </div>

                <div class="mode-cards">
                    <button class="mode-card" type="button" data-mode="c">
                        <span class="mode-card-top">
                            <span class="mode-icon">C</span>
                            <span class="mode-tag">消费品卖货</span>
                        </span>
                        <span class="mode-title">品牌 / 卖家</span>
                        <span class="mode-desc">适合直接卖货的跨境电商业务，预估销售额、毛利和播放收益。</span>
                        <span class="mode-examples">美妆、服饰、家居、3C、宠物用品</span>
                        <span class="mode-action">开始测算</span>
                    </button>

                    <button class="mode-card" type="button" data-mode="b">
                        <span class="mode-card-top">
                            <span class="mode-icon">B</span>
                            <span class="mode-tag">B 端询盘</span>
                        </span>
                        <span class="mode-title">工厂 / 项目方</span>
                        <span class="mode-desc">适合项目型业务，预估播放量、询盘数、成交概率和期望利润。</span>
                        <span class="mode-examples">设备、工程、软硬件方案、充电桩</span>
                        <span class="mode-action">开始测算</span>
                    </button>
                </div>

                <div class="home-note">
                    <span>无需登录</span>
                    <span>本地计算</span>
                    <span>测算后可查看避坑指南</span>
                </div>
            </div>
        </section>

        <section id="cEndForm" class="form-container">
            <div class="container">
                <button class="back-btn" type="button" data-back="mode">返回选择</button>

                <div class="form-card">
                    <div class="form-header">
                        <div class="form-icon">C</div>
                        <h2>卖家收益测算</h2>
                        <p>适用于品牌、店铺、跨境电商团队</p>
                    </div>

                    <div class="form-group">
                        <label for="cCompanyName">公司名称</label>
                        <input type="text" id="cCompanyName" placeholder="例如：ABC Trading Co., Ltd.">
                    </div>

                    <div class="form-group">
                        <label for="cPrice">产品客单价（美元）</label>
                        <input type="number" id="cPrice" placeholder="例如：29.99" step="0.01" min="0.01">
                    </div>

                    <div class="form-group">
                        <label for="cMonthlySales">预估月销量（件）</label>
                        <input type="number" id="cMonthlySales" placeholder="例如：500" step="1" min="0">
                    </div>

                    <div class="form-group">
                        <label for="cCategory">产品品类</label>
                        <select id="cCategory">
                            <option value="">请选择</option>
                            <option value="beauty">美妆护肤</option>
                            <option value="clothing">服饰箱包</option>
                            <option value="home">家居生活</option>
                            <option value="electronics">3C 数码</option>
                            <option value="pet">宠物用品</option>
                            <option value="sports">运动户外</option>
                            <option value="baby">母婴用品</option>
                            <option value="food">食品饮料</option>
                            <option value="jewelry">饰品配件</option>
                            <option value="auto">汽车用品</option>
                            <option value="tools">工具五金</option>
                            <option value="stationery">文具办公</option>
                            <option value="other">其他</option>
                        </select>
                    </div>

                    <div class="form-group conditional-field" id="cOtherCategoryGroup" hidden>
                        <label for="cOtherCategory">其他产品类型</label>
                        <input type="text" id="cOtherCategory" placeholder="例如：宠物用品、运动户外">
                    </div>

                    <button class="calculate-btn" type="button" id="cCalculateBtn">测算收益</button>
                    <div id="cResult" class="result-card" hidden></div>
                </div>
            </div>
        </section>

        <section id="bEndForm" class="form-container">
            <div class="container">
                <button class="back-btn" type="button" data-back="mode">返回选择</button>

                <div class="form-card">
                    <div class="form-header">
                        <div class="form-icon">B</div>
                        <h2>工厂/项目方收益测算</h2>
                        <p>适用于设备、工程、软硬件项目型业务</p>
                    </div>

                    <div class="form-group">
                        <label for="bCompanyName">公司名称</label>
                        <input type="text" id="bCompanyName" placeholder="例如：XYZ Technology Co., Ltd.">
                    </div>

                    <div class="form-group">
                        <label for="bProductType">产品类型</label>
                        <select id="bProductType">
                            <option value="">请选择</option>
                            <option value="parking_gate">停车场道闸</option>
                            <option value="guidance_system">车位引导系统</option>
                            <option value="lpr_camera">车牌识别摄像头</option>
                            <option value="ev_charger">充电桩配套</option>
                            <option value="packaging">包装材料</option>
                            <option value="cable">线缆</option>
                            <option value="transformer">互感器</option>
                            <option value="sensor">传感器</option>
                            <option value="industrial_parts">工业零部件</option>
                            <option value="machinery">机械设备</option>
                            <option value="solar_storage">光伏储能配套</option>
                            <option value="security">安防设备</option>
                            <option value="led_lighting">LED 照明</option>
                            <option value="other">其他软硬件</option>
                        </select>
                    </div>

                    <div class="form-group conditional-field" id="bOtherProductTypeGroup" hidden>
                        <label for="bOtherProductType">其他产品类型</label>
                        <input type="text" id="bOtherProductType" placeholder="例如：门禁系统、智能照明">
                    </div>

                    <div class="form-group">
                        <label>成交模式</label>
                        <div class="segmented-control">
                            <button class="segment-btn active" type="button" data-b-model="auto">自动判断</button>
                            <button class="segment-btn" type="button" data-b-model="project">项目单</button>
                            <button class="segment-btn" type="button" data-b-model="batch">小批量订单</button>
                        </div>
                        <input type="hidden" id="bDealModel" value="auto">
                    </div>

                    <div class="form-group">
                        <label for="bPriceRange">单笔成交金额范围</label>
                        <select id="bPriceRange">
                            <option value="">请选择</option>
                            <option value="5k-10k">$5,000 - $10,000</option>
                            <option value="10k-30k">$10,000 - $30,000</option>
                            <option value="30k-50k">$30,000 - $50,000</option>
                            <option value="50k+">$50,000 以上</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>是否有产品视频素材？</label>
                        <div class="toggle-buttons">
                            <button class="toggle-btn" type="button" data-video="true">有</button>
                            <button class="toggle-btn active" type="button" data-video="false">无</button>
                        </div>
                        <input type="hidden" id="bHasVideo" value="false">
                    </div>

                    <button class="calculate-btn" type="button" id="bCalculateBtn">测算收益</button>
                    <div id="bResult" class="result-card" hidden></div>
                </div>
            </div>
        </section>
    </div>

    <div id="guideModal" class="modal" hidden>
        <div class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="guideTitle">
            <button class="modal-close" type="button" id="guideCloseBtn" aria-label="关闭">×</button>
            <h2 id="guideTitle">避坑指南</h2>
            <div id="guideContent" class="guide-content"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
